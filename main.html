<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Inquiry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at top left, rgba(0, 180, 216, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(72, 202, 228, 0.25), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 55%, #111827);
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: rgba(0, 180, 216, 0.18);
      filter: blur(90px);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    .glow.one {
      top: -120px;
      left: -120px;
    }

    .glow.two {
      bottom: -140px;
      right: -100px;
      animation-delay: 2s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92%, 620px);
      padding: 48px 36px;
      text-align: center;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(0, 180, 216, 0.16);
      color: #90e0ef;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 18px;
      font-size: clamp(2.1rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 auto 30px;
      max-width: 500px;
      color: #cbd5e1;
      font-size: 1.08rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 15px 24px;
      border-radius: 14px;
      color: #02111f;
      background: linear-gradient(135deg, #48cae4, #00b4d8);
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 14px 35px rgba(0, 180, 216, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 45px rgba(0, 180, 216, 0.42);
    }

    .footer {
      margin-top: 32px;
      color: #64748b;
      font-size: 0.85rem;
    }

    @keyframes float {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(40px, 30px, 0) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="card">
    <span class="badge">Domain Available</span>
    <h1>This domain may be available.</h1>
    <p>
      For information or sale inquiries regarding this domain, please contact us by email.
    </p>
    <a href="mailto:info@technyah.com">info@technyah.com</a>
    <div class="footer">Serious inquiries only</div>
  </main>
</body>
</html>
